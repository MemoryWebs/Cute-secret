<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Secret 🤍</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(to bottom, #fff0f5, #ffe6f0);
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
}

/* Landing Screen */

#startScreen {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

#startScreen h2 {
    color: #ff4d6d;
    margin-bottom: 20px;
}

button {
    padding: 14px 28px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    background-color: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #e6005c;
}

/* Video Section */

#videoContainer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

video {
    position: absolute;
    top: 50%;
    left: 50%;
    height: 100%;
    width: auto;
    transform: translate(-50%, -50%);
}

/* Love Text */

#loveText {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    font-size: 32px;
    color: white;
    font-weight: bold;
    opacity: 0;
    transition: opacity 2s ease-in-out;
    text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Floating Hearts */

.heart {
    position: absolute;
    font-size: 22px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="startScreen">
    <h2>Long distance but still close 🤍</h2>
    <button onclick="startSecret()">Tap to reveal the secret 🐻</button>
</div>

<div id="videoContainer">
    <video id="secretVideo" src="cute.mp4"></video>
    <div id="loveText"></div>
</div>

<script>

// 🔥 YOU CHANGE THIS NAME FOR EACH CLIENT
const partnerName = "Aduu";

function startSecret() {
    document.getElementById("startScreen").style.display = "none";

    const videoContainer = document.getElementById("videoContainer");
    const video = document.getElementById("secretVideo");
    const loveText = document.getElementById("loveText");

    videoContainer.style.display = "block";
    video.play();

    video.onended = function() {
        loveText.innerHTML = "I Love You, " + partnerName + " ❤️";
        loveText.style.opacity = "1";
        createHearts();
    };
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.color = "pink";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}

</script>

</body>
</html>
