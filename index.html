<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Secret 🤍</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #fdfbfb, #ffe4ec);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Card Container */

.container {
    width: 90%;
    max-width: 380px;
    background: white;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
    padding: 40px 20px;
    transition: 0.5s ease;
}

/* Landing Screen */

h2 {
    color: #ff4d88;
    margin-bottom: 20px;
    font-weight: 500;
}

button {
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(to right, #ff6fa5, #ff4d88);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: scale(1.05);
}

/* Video */

video {
    width: 100%;
    border-radius: 20px;
    display: none;
}

/* Hearts */

.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>Long distance… but still magical 🤍</h2>
    <button onclick="startSecret()">Tap for a surprise 🐻</button>
    <video id="secretVideo" src="cute.mp4" playsinline></video>
</div>

<script>

function startSecret() {
    const button = document.querySelector("button");
    const video = document.getElementById("secretVideo");

    button.style.display = "none";
    video.style.display = "block";

    video.play();

    video.onended = function() {
        createHearts();
    };
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.color = "#ff4d88";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}

</script>

</body>
</html>
