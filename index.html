<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Secret 🤍</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
}

/* Background Image */

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url("background.jpg") no-repeat center center/cover;
    filter: blur(2px);
    z-index: -2;
}

/* Dark Overlay */

body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.05);
    z-index: -1;
}

/* Center Content */

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Button */

button {
    padding: 14px 30px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(to right, #ff6fa5, #ff4d88);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

button:hover {
    transform: scale(1.05);
}

/* Video Section */

#videoContainer {
    display: none;
    position: fixed;
    inset: 0;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(1px);
    background: rgba(255, 255, 255, 0.01);
}

video {
    max-height: 90vh;
    max-width: 95%;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
</style>
</head>

<body>

<div class="container">
    <button onclick="startSecret()">Tap for a surprise 🐻</button>
</div>

<div id="videoContainer">
    <video id="secretVideo" playsinline preload="auto">
        <source src="cute.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<script>

function startSecret() {
    document.querySelector(".container").style.display = "none";
    const videoContainer = document.getElementById("videoContainer");
    const video = document.getElementById("secretVideo");

    videoContainer.style.display = "flex";

    video.load(); // ensure reload
    video.play().catch(error => {
        console.log("Playback prevented:", error);
    });
}

</script>

</body>
</html>
