<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Secret 🤍</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#startScreen {
    text-align: center;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background-color: pink;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: hotpink;
}

#videoContainer {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#loveText {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: #ff4d6d;
    font-weight: bold;
    opacity: 0;
    transition: opacity 2s ease-in-out;
}

.heart {
    position: absolute;
    color: red;
    font-size: 24px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="startScreen">
    <button onclick="startSecret()">Tap to reveal a secret 🐻</button>
</div>

<div id="videoContainer">
    <video id="secretVideo" src="cute.mp4"></video>
    <div id="loveText">I Love You ❤️</div>
</div>

<script>
function startSecret() {
    document.getElementById("startScreen").style.display = "none";
    const videoContainer = document.getElementById("videoContainer");
    const video = document.getElementById("secretVideo");
    const loveText = document.getElementById("loveText");

    videoContainer.style.display = "block";
    video.play();

    video.onended = function() {
        loveText.style.opacity = "1";
        createHearts();
    };
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
}
</script>

</body>
</html>
